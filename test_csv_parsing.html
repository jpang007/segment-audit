<!DOCTYPE html>
<html>
<head>
    <title>CSV Parsing Test</title>
</head>
<body>
    <h1>CSV Parsing Test</h1>
    <div id="output"></div>

    <script>
        function parseLine(line) {
            const values = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            values.push(current.trim());
            return values;
        }

        async function testParsing() {
            try {
                const response = await fetch('/audit_data/segment_sources_audit.csv');
                const text = await response.text();
                const lines = text.trim().split('\n');

                const headers = parseLine(lines[0]);
                console.log('Headers:', headers);

                const firstDataLine = parseLine(lines[1]);
                console.log('First data line:', firstDataLine);

                const obj = {};
                headers.forEach((header, i) => {
                    obj[header] = firstDataLine[i] || '';
                });

                console.log('Parsed object:', obj);
                console.log('Logo URL:', obj['Logo URL']);

                document.getElementById('output').innerHTML = `
                    <h2>Headers (${headers.length}):</h2>
                    <pre>${JSON.stringify(headers, null, 2)}</pre>

                    <h2>First Row Data:</h2>
                    <pre>${JSON.stringify(obj, null, 2)}</pre>

                    <h2>Logo URL Test:</h2>
                    <p>Logo URL value: "${obj['Logo URL']}"</p>
                    <img src="${obj['Logo URL']}" style="width: 50px; height: 50px;" onerror="this.parentElement.innerHTML += '<br>ERROR: Image failed to load'">
                `;
            } catch (error) {
                document.getElementById('output').innerHTML = `<pre>Error: ${error.message}</pre>`;
                console.error(error);
            }
        }

        testParsing();
    </script>
</body>
</html>
